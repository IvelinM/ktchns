<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="5" fill="#0e0e0e"/>
  <!-- Thin gold frame inset -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="3.5" fill="none" stroke="#d4a96a" stroke-width="0.6" opacity="0.5"/>
  <!-- IM letters -->
  <text
    x="16" y="20"
    font-family="Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="13.5"
    font-weight="300"
    fill="#d4a96a"
    text-anchor="middle"
    letter-spacing="3"
    dx="1.5"
  >IM</text>
  <!-- Accent rule -->
  <rect x="9" y="24" width="14" height="0.8" rx="0.4" fill="#d4a96a" opacity="0.7"/>
</svg>
