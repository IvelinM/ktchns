<section class="hero-slider">
  <!-- Slides -->
  <div class="slides">
    <div
      *ngFor="let img of images; let i = index"
      class="slide"
      [class.active]="i === currentIndex"
      [class.prev]="i === prevIndex"
      [style.background-image]="'url(' + img + ')'"
    ></div>
  </div>

  <!-- Dark overlay -->
  <div class="overlay"></div>

  <!-- Hero text -->
  <div class="hero-text">
    <svg class="hero-logo" viewBox="0 0 556.8 303.71" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <polygon points="322.98,32 185.89,244.8 49.37,32 33.13,32 33.13,32.43 183.19,266.33 185.9,266.33 336.85,32"/>
      <polygon points="495.19,32.84 494.29,32.84 494.29,34.03 355.75,217.01 301.6,145.18 293.86,157.2 353,235.64 355.76,235.64 494.29,52.67 494.29,264.33 506.18,264.33 506.18,36.97 506.18,32.84"/>
    </svg>
    <p class="eyebrow">Via Minima Design</p>
    <p class="eyebrow-slogan">Minimalistic design</p>
    <h1>{{ title }}</h1>
    <p class="subtitle">{{ subtitle }}</p>
    <button class="cta-btn" (click)="ctaClick.emit()">
      {{ ctaLabel }}<span class="arrow">→</span>
    </button>
  </div>

  <!-- Prev / Next -->
  <button class="nav prev" (click)="prev()" aria-label="Previous">&#8249;</button>
  <button class="nav next" (click)="next()" aria-label="Next">&#8250;</button>

  <!-- Dot indicators -->
  <div class="dots">
    <span
      *ngFor="let img of images; let i = index"
      class="dot"
      [class.active]="i === currentIndex"
      (click)="goTo(i)"
    ></span>
  </div>
</section>
