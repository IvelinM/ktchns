<form class="contact-form" (ngSubmit)="sendEmail()" #cf="ngForm">

  <div class="form-group">
    <input type="text" name="from_name" [(ngModel)]="formData.from_name"
           [placeholder]="t.contactNameLabel"
           required autocomplete="name">
  </div>

  <div class="form-group">
    <input type="email" name="from_email" [(ngModel)]="formData.from_email"
           [placeholder]="t.contactEmailLabel"
           required email autocomplete="email"
           #emailField="ngModel">
    <p class="field-error" *ngIf="emailField.invalid && emailField.touched">
      {{ t.contactEmailError }}
    </p>
  </div>

  <div class="form-group">
    <input type="tel" name="phone" [(ngModel)]="formData.phone"
           [placeholder]="t.contactPhoneLabel"
           required autocomplete="tel"
           pattern="^(\+359|0)[\d\s]{8,13}$"
           #phoneField="ngModel">
    <p class="field-error" *ngIf="phoneField.invalid && phoneField.touched">
      {{ t.contactPhoneError }}
    </p>
  </div>

  <div class="form-group">
    <textarea name="message" [(ngModel)]="formData.message"
              [placeholder]="t.contactMessageLabel"
              rows="5" required></textarea>
  </div>

  <button type="submit" class="form-submit"
          [disabled]="cf.invalid || formStatus === 'sending'">
    {{ formStatus === 'sending' ? t.contactSending : t.contactSend }}
  </button>

  <p class="form-feedback success" *ngIf="formStatus === 'success'">{{ t.contactSuccess }}</p>
  <p class="form-feedback error"   *ngIf="formStatus === 'error'">{{ t.contactError }}</p>

</form>
